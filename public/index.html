<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1d4ed8">
<title>Onsite Ops</title>
<meta name="description" content="Operational management for onsite and operational teams: profiles, calendars, work orders and inspection reports.">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="app"><div class="login-screen"><div class="spinner" style="width:32px;height:32px;border-width:3px"></div></div></div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/calendar.js"></script>
<script src="/js/workorders.js"></script>
<script src="/js/team.js"></script>
<script src="/js/reports.js"></script>
<script src="/js/tasks.js"></script>
<script src="/js/leads.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js').then((reg) => {
        // Check for a newer deployed version every time the app gains focus,
        // so updates show up without anyone needing to know what a "hard
        // refresh" is.
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') reg.update().catch(() => {});
        });
      }).catch(() => {});

      // When a new service worker takes control, the page is now holding
      // old cached JS in memory — reload once to pick up the new code cleanly.
      let refreshed = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshed) return;
        refreshed = true;
        window.location.reload();
      });
    });
  }
</script>
</body>
</html>
